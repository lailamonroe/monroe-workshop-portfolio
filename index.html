<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laila Monroe Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="global-brand">
      <a href="index.html" aria-label="Laila Monroe home">
        <img
          src="assets/mainnamedarkpurple.png"
          alt="Laila"
          class="global-brand-logo"
        />
      </a>
    </div>

    <nav class="nav nav-icons">
      <a href="index.html" aria-label="Home">
        <img src="assets/homeicon.png" alt="Home" class="header-icon" />
      </a>
      <a href="about.html" aria-label="About">
        <img src="assets/abouticon.png" alt="About" class="header-icon" />
      </a>
      <a href="contact.html" aria-label="Contact">
        <img src="assets/contact icon.png" alt="Contact" class="header-icon" />
      </a>
    </nav>
  </header>

  <main id="top">
    <section class="scroll-sequence" id="scrollSequence">
      <div class="sequence-sticky">
        <div class="bg-layer bg-dark" id="bgDark"></div>
        <div class="bg-layer bg-light" id="bgLight"></div>

        <div class="phase phase-logo" id="phaseLogo">
          <div class="logo-cycle-wrap">
            <img src="assets/name1.png" alt="Laila" class="cycle-logo active" />
            <img src="assets/name2.png" alt="Laila" class="cycle-logo" />
            <img src="assets/name3.png" alt="Laila" class="cycle-logo" />
          </div>
        </div>

        <div class="phase phase-stars" id="phaseStars">
          <div class="stars-layer">
            <img src="assets/star1.png" class="star star-1" alt="" />
            <img src="assets/star2.png" class="star star-2" alt="" />
            <img src="assets/star3.png" class="star star-3" alt="" />
            <img src="assets/star4.png" class="star star-4" alt="" />
            <img src="assets/star1.png" class="star star-5" alt="" />
            <img src="assets/star2.png" class="star star-6" alt="" />
            <img src="assets/star3.png" class="star star-7" alt="" />
          </div>

          <div class="welcome-wrap">
            <p class="eyebrow">LAILA MONROE</p>
            <h1 class="typing-line">
              <span id="typedText"></span><span class="cursor">|</span>
            </h1>
          </div>
        </div>

        <div class="phase phase-desk" id="phaseDesk">
          <div class="desk-prompt">
            <img src="assets/star1.png" alt="" class="desk-prompt-star" />
            <p>select a folder to check out my work</p>
          </div>

          <div class="scene-window">
            <div class="scene-track" id="sceneTrack">
              <img
                src="assets/Shape-1.png"
                alt="Illustrated creative workspace"
                class="scene-image"
              />

              <div class="monitor-desktop" aria-label="Project folders">
                <a class="desktop-folder folder-ncpa" href="projects/project-1.html" data-slide="left">
                  <img src="assets/foldericon.png" alt="" class="folder-icon" />
                  <span>NPCA</span>
                </a>

                <a class="desktop-folder folder-poppi" href="projects/project-2.html" data-slide="left">
                  <img src="assets/foldericon.png" alt="" class="folder-icon" />
                  <span>poppi</span>
                </a>

                <a class="desktop-folder folder-other" href="projects/projects.html" data-slide="left">
                  <img src="assets/foldericon.png" alt="" class="folder-icon" />
                  <span>Other</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="bottom-dock-wrap">
    <div class="dock-popout" id="dockPopout">
      <div class="dock-popout-inner" id="dockPopoutInner"></div>
    </div>

    <div class="bottom-dock">
      <button class="dock-btn" id="socialBtn" aria-label="Socials">
        <span class="icon info-icon">i</span>
      </button>

      <button class="dock-btn" id="notebookBtn" aria-label="Notebook">
        <span class="icon notebook-icon"></span>
      </button>

      <button class="dock-btn is-disabled" id="prevPageBtn" aria-label="Previous page">
        <span class="icon chevron left"></span>
      </button>

      <button class="dock-btn" id="nextPageBtn" aria-label="Next page">
        <span class="icon chevron right"></span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
